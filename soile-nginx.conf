server {
        listen 443 ssl; #managed by Certbot
	server_name <YourHostName>;

	ssl_certificate <CERTIfICATE LOCATION>; # managed by Certbot
	ssl_certificate_key <KEY_LOCATION>; # managed by Certbot
	add_header X-Frame-Options "SAMEORIGIN";
	add_header X-Content-Type-Options "nosniff";
	add_header Referrer-Policy "strict-origin";

        
	# Redirect non-https traffic to https
        if ($scheme != "https") {
                return 301 https://$host$request_uri;
        } # managed by Certbot
        location ~ \/exp\/.*\/.*\/.+ {
                rewrite ^/exp(.*)$ /run$1 break;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-NginX-Proxy true;                
                proxy_pass https://localhost:1026;
                proxy_redirect off;
                proxy_set_header Host $host;
               
                add_header X-Frame-Options "SAMEORIGIN";
                add_header X-Content-Type-Options "nosniff";
                add_header Referrer-Policy "strict-origin";
        } 
        location ~ \/editing\/.*\/.*\/.* {
                rewrite ^\/editing(\/\w+\/\w+)(\/.*)$ /task$1/execute$2 break;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-NginX-Proxy true;                
                proxy_pass https://localhost:1026;
                proxy_redirect off;
                proxy_set_header Host $host;
                add_header X-Frame-Options "SAMEORIGIN";
                add_header X-Content-Type-Options "nosniff";
                add_header Referrer-Policy "strict-origin";
        }
        location ~ \/pilot\/.*\/.*\/.+ {
                rewrite ^\/pilot(\/\w+\/\w+)(\/.+)$ /task$1/execute$2 break;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-NginX-Proxy true;                
                proxy_pass https://localhost:1026;
                proxy_redirect off;
                proxy_set_header Host $host;
                add_header X-Frame-Options "SAMEORIGIN";
                add_header X-Content-Type-Options "nosniff";
                add_header Referrer-Policy "strict-origin";
        }
        location ~ \/api\/.+ {
                rewrite ^\/api\/(.+)$ /$1 break;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-NginX-Proxy true;                
                proxy_pass https://localhost:1026;
                proxy_redirect off;
                proxy_set_header Host $host;
                add_header X-Frame-Options "SAMEORIGIN";
                add_header X-Content-Type-Options "nosniff";
                add_header Referrer-Policy "strict-origin";

        }
        location ~ \/help\/.* {
                root /SOILE/experimentrunner/dist;
                add_header X-Frame-Options "SAMEORIGIN";
                add_header X-Content-Type-Options "nosniff";
                add_header Referrer-Policy "strict-origin";
        }
        location / {
                root /SOILE/experimentrunner/dist;
                try_files $uri $uri/ /index.html;
                add_header X-Frame-Options "SAMEORIGIN";
                add_header X-Content-Type-Options "nosniff";
                add_header Referrer-Policy "strict-origin";
        }
}
